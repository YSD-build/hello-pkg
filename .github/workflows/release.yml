name: Build and Publish hello Package

on:
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static binary
        run: |
          gcc -static -o hello src/hello.c

      - name: Compute SHA256
        id: sha
        run: |
          echo "sha256=$(sha256sum hello | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Upload binary to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          aws s3 cp hello s3://${{ secrets.R2_BUCKET_NAME }}/packages/hello/hello-${VERSION} --endpoint-url $AWS_ENDPOINT_URL

      - name: Update index.yaml and sign
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          PRIVATE_KEY: ${{ secrets.SIGN_PRIVATE_KEY }}
        run: |
          sudo snap install yq
          VERSION=${GITHUB_REF_NAME#v}
          DOWNLOAD_URL="${PUBLIC_URL}/packages/hello/hello-${VERSION}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          # 下载现有索引
          aws s3 cp s3://${BUCKET}/index.yaml ./index.yaml --endpoint-url $AWS_ENDPOINT_URL || echo "{}" > index.yaml

          # 更新 yaml
          yq eval ".packages.hello.versions.\"${VERSION}\" = {\"download_url\": \"${DOWNLOAD_URL}\", \"checksum\": \"sha256:${SHA256}\", \"architecture\": \"x86_64\"}" -i index.yaml

          # 上传新索引
          aws s3 cp index.yaml s3://${BUCKET}/index.yaml --endpoint-url $AWS_ENDPOINT_URL

          # 签名
          echo "$PRIVATE_KEY" > private.key
          minisign -S -s private.key -m index.yaml -x index.yaml.sig
          rm private.key
          aws s3 cp index.yaml.sig s3://${BUCKET}/index.yaml.sig --endpoint-url $AWS_ENDPOINT_URL