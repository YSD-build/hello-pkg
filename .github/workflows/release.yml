name: Build and Publish to R2

on:
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build binary
        run: |
          mkdir -p install/bin
          gcc -o install/bin/hello src/hello.c

      - name: Create metadata.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cat > metadata.json <<EOF
          {
            "name": "hello",
            "version": "$VERSION",
            "architecture": "x86_64",
            "dependencies": []
          }
          EOF

      # --- 关键修改：统一打包命令 ---
      - name: Package as .homl (tar.xz)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # 统一命名为：包名-版本-架构.homl
          tar -cJf hello-${VERSION}-x86_64.homl metadata.json install/

      - name: Compute SHA256
        id: sha
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "sha256=$(sha256sum hello-${VERSION}-x86_64.homl | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # 上传路径同步更新
          aws s3 cp hello-${VERSION}-x86_64.homl \
            s3://${{ secrets.R2_BUCKET_NAME }}/packages/hello/hello-${VERSION}-x86_64.homl \
            --endpoint-url $AWS_ENDPOINT_URL

      - name: Update index.yaml on R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          sudo snap install yq
          VERSION=${GITHUB_REF_NAME#v}
          PACKAGE=hello
          SHA256="${{ steps.sha.outputs.sha256 }}"  # 从上面步骤获取 SHA256
          DOWNLOAD_URL="${PUBLIC_URL}/packages/hello/hello-${VERSION}-x86_64.homl"

          # 下载现有 index.yaml
          aws s3 cp s3://${BUCKET}/index.yaml ./index.yaml --endpoint-url $AWS_ENDPOINT_URL || echo "{}" > index.yaml
          
          # 更新索引，现在 checksum 有正确的值了
          yq eval ".packages.\"${PACKAGE}\".versions.\"${VERSION}\" = {\"download_url\": \"${DOWNLOAD_URL}\", \"checksum\": \"sha256:${SHA256}\", \"architecture\": \"x86_64\"}" -i index.yaml
          
          # 上传更新后的索引
          aws s3 cp index.yaml s3://${BUCKET}/index.yaml --endpoint-url $AWS_ENDPOINT_URL