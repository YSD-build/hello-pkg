name: Build and Publish homl Client

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libcurl4-openssl-dev libyaml-dev libsodium-dev libssl-dev minisign

      - name: Build static binary
        run: |
          gcc -static -o homl homl.c -lcurl -lyaml -lsodium -lssl -lcrypto

      - name: Sign the binary
        env:
          PRIVATE_KEY: ${{ secrets.SIGN_PRIVATE_KEY }}
        run: |
          echo "$PRIVATE_KEY" > private.key
          minisign -S -s private.key -m homl -x homl.sig
          rm private.key

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 cp homl s3://${{ secrets.R2_BUCKET_NAME }}/clients/homl --endpoint-url $AWS_ENDPOINT_URL
          aws s3 cp homl.sig s3://${{ secrets.R2_BUCKET_NAME }}/clients/homl.sig --endpoint-url $AWS_ENDPOINT_URL

      - name: Set latest version file (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "$VERSION" | aws s3 cp - s3://${{ secrets.R2_BUCKET_NAME }}/clients/latest_version --endpoint-url $AWS_ENDPOINT_URL